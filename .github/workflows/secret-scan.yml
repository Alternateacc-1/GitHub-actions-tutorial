# API keys ,sensitive files,credentials
# done by with help of Gitleaks

name: Secret_Scan

on:
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v5
              with:
                   fetch-depth: 0
            
            - name: Run Gitleaks Scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}   # Actions such as Gitleaks, GitHub CLI, or API calls need a way to authenticate.
                # When a GitHub Actions workflow starts, GitHub automatically creates a temporary token for that workflow run
                # access card is ditroyed at the end
                # GITHUB_TOKEN is an automatically generated, short-lived token that GitHub provides to each workflow run. It allows the workflow or actions to authenticate with GitHub APIs and repository resources without exposing personal access tokens. The token is created at the start of the run and revoked when the run completes.
            
              
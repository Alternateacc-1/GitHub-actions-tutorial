name: Devsecops-Pipeline

on:
  workflow_dispatch:

jobs:
  # yeh saare apne code ke related job bhi the voh run ho gaye
  code-quality:                         
    uses: ./.github/workflows/code-quality.yml        

  secret-scan:
    uses: ./.github/workflows/secret-scan.yml

  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml

  docker-lint:
    uses: ./.github/workflows/docker-lint.yml

  # abhi build ke related. Build once the security scan is complete on the code
  build:
    needs: [code-quality,secret-scan,dependency-scan,docker-lint]
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
  # image scan check 
  trivy:
    needs: [build]
    uses: ./.github/workflows/image-scan.yml
    secrets: inherit
  # deploy to production 
  deploy:
    needs: [trivy]
    uses: ./.github/workflows/deploy-server.yml
    secrets: inherit


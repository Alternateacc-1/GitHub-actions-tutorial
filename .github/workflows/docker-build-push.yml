name: Docker-Build-Push

on:
    push:
        branches: [main]  # triggers the workflow on push to the main branch

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with: 
                username: ${{vars.DOCKERHUB_USER}}
                password: ${{secrets.DOCKERHUB_TOKEN}}
         
            - name: Build & Push Docker
              uses: docker/build-push-action@v6
              with:
                push: true
                tags: |                        # image name bhi toh dena padhenga
                    ${{vars.DOCKERHUB_USER}}/github-actions-app:${{github.ref_name}}   
                    ${{vars.DOCKERHUB_USER}}/github-actions-app:latest
                    ${{vars.DOCKERHUB_USER}}/github-actions-app:${{github.sha}}
        

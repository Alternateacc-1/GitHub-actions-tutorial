# packages-issue /vulnerability scan 
# pip-audit 
name: Dependency-scan

on:
    workflow_call:

jobs:
    dependency_check:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v5

            - name: Setup python:3.10
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
            
            - name: Install Pip dependency audit
              run: pip install pip-audit

            - name: Audit dependencies
              run: pip-audit -r lint-files/requirement.txt  # -r :recursively
       
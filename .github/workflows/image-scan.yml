# uses trivy image scanner for CVEs
name: Image-scanner

on:
    workflow_call:

jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:
           # - name: checkout code
           #    uses: actions/checkout@v5   image pe scan kar rhe joh docker-build-push.yml ne banayie hai

            
            - name: Login to DockerHub
              uses: docker/login-action@v3
              with: 
                username: ${{vars.DOCKERHUB_USER}}
                password: ${{secrets.DOCKERHUB_TOKEN}}
            
            - name: Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{vars.DOCKERHUB_USER}}/github-actions-app:${{github.sha}}
                severity: 'CRITICAL'  # real-time use 'CRITICAL,HIGH'too
                exit-code: '1'
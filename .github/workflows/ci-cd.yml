name: CI/CD Pipeline

on:
    workflow_dispatch:
      inputs:
        environment:
          description: This is the environment value where workflow runs
          default: 'dev'
          required: true
          type: choice
          options:
            - dev
            - prod
            - staging

jobs: 
    code:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          run: echo 'code is checked out'   

    build:
        needs: code
        runs-on: ubuntu-latest

        steps:
            - name: Checkout build
              run: echo'build is done'
    test:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout test
              run: echo 'test is done'

    deploy:
        if: inputs.environment == 'dev'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout deploy
              run: echo 'deploy is done'

    